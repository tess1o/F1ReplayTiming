services:
  backend:
    build:
      context: .
      dockerfile: backend-go/Dockerfile
    environment:
      - DATA_DIR=/data
      - REPLAY_CACHE_MAX_MB=64
      - REPLAY_CACHE_TTL_SECONDS=45
      - GOMEMLIMIT=192MiB
      - GOGC=30
      # Optional - uncomment to enable features
      # - OPENROUTER_API_KEY=your-key-here  # enables photo/screenshot sync (manual entry sync works without this)
      # - AUTH_ENABLED=true
      # - AUTH_PASSPHRASE=your-passphrase
    volumes:
      - f1data:/data
      - f1cache:/data/fastf1-cache

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"  # Change the left side to use a different host port
    depends_on:
      - backend

volumes:
  f1data:
  f1cache:
