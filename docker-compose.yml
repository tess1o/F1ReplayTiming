services:
  f1-backend:
    container_name: f1-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATA_DIR=/data
      - REPLAY_CACHE_MAX_MB=64
      - REPLAY_CACHE_TTL_SECONDS=45
      - GOMEMLIMIT=192MiB
      - GOGC=30
      # Optional - uncomment to enable features
      # - AUTH_ENABLED=true
      # - AUTH_PASSPHRASE=your-passphrase
      # Enable only when frontend calls backend directly (cross-origin)
      # - FRONTEND_URL=http://localhost:3000
      # - EXTRA_ORIGINS=https://f1.example.com
    volumes:
      - f1data:/data
      - f1cache:/data/fastf1-cache

  f1-frontend:
    build: ./frontend
    container_name: f1-frontend
    #environment:
      # Optional runtime override for proxy upstream (/api + /ws)
      # - BACKEND_INTERNAL_URL=http://backend:8000
      # Optional: browser talks to backend directly (requires backend CORS)
      # - NEXT_PUBLIC_API_URL=https://api.f1.example.com
    ports:
      - "3000:3000"  # Change the left side to use a different host port
    depends_on:
      - f1-backend

volumes:
  f1data:
  f1cache:
